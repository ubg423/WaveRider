	<script> 
		var loadStartTime = performance.now();
		var progressElement = document.getElementById('progress_fill');
		var container =	document.getElementById("unity-container");
		var canvas =	document.getElementById("unity-canvas");
		var loadingBar = document.querySelector("#loadingBlock");
		var progressBarFull = document.querySelector("#progress_fill");
		var progress_text = document.querySelector(".gameloader-progress-info");
		let text_percent = "";
		var script = document.createElement("script");
		script.src = loaderUrl;
		script.onload = () => {
		createUnityInstance(canvas, config, (progress) => {
			progressElement.style.width = 100 * progress + "%";
			text_percent = "Downloading file: " + Math.round(progress*100) + "%";
			progress_text.innerText = text_percent;
			if (progress >= 99) {
				progress_text.innerText = "Game Loading ...";
			}
		}).then((unityInstance) => {
			window.unityInstance = unityInstance;
			setTimeout(function() {
				loadingBar.style.display = "none";
				window.focus();
				var loadDurationMs = Math.round(performance.now() - loadStartTime);
				firebaseLogEventParameter("loaded_game", {
					load_time_ms: loadDurationMs
				});
			}, 2000);
			container.style.display = "block";
		}).catch((message) => {
			alert(message);
		});
		};
		document.body.appendChild(script);
	</script>

					console.warn("GMGameSDK not available after load");
				}
			} catch (e) {
				console.warn("GMGameSDK.init failed:", e);
			}
		};

		// handle load failure
		scriptGMFirebase.onerror = function () {
			console.warn("Failed to load GM SDK");
		};
		window.addEventListener("error", function (e) {
			if (e.filename && e.filename.includes("gm-sdk.js")) {
				console.warn("Error from GM SDK:", e.message);

				// prevent it from breaking your game
				e.preventDefault();
			}
		});
		window.addEventListener("unhandledrejection", function (e) {
			console.warn("Unhandled promise (possibly SDK):", e.reason);
		});
		
		document.head.appendChild(scriptGMFirebase);
	</script>

	<script>
		function isFirebaseReady() {
            try {
                return typeof firebase !== "undefined" &&
                    firebase.apps &&
                    firebase.apps.length > 0;
            } catch (e) {
                return false;
            }
        }

        function firebaseSetUserProperties(props) {
            try {
                if (isFirebaseReady()) {
                    firebase.analytics().setUserProperties(props);
                }
            } catch (e) {}
        }

        function firebaseLogEvent(event_name) {
            try {
                if (isFirebaseReady()) {
                    firebase.analytics().logEvent(event_name);
                }
            } catch (e) {}
			try {
				GMGameSDK.trackEvent(event_name);
			}catch (e) {}
        }

        function firebaseLogEventParameter(event_name, event_param) {
            try {
                if (isFirebaseReady()) {
                    firebase.analytics().logEvent(event_name, event_param);
                }
            } catch (e) {}

        }
